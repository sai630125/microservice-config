spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.webmvc.routes[0].id=users-service
spring.cloud.gateway.webmvc.routes[0].uri=lb://users-server
spring.cloud.gateway.webmvc.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.webmvc.routes[1].id=products-service
spring.cloud.gateway.webmvc.routes[1].uri=lb://products-service
spring.cloud.gateway.webmvc.routes[1].predicates[0]=Path=/api/products/**
